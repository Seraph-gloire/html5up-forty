name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy  # Ajouté pour que ça se déclenche sur ta nouvelle branche

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1
  # On utilise directement le secret pour le registry
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ===============================
  # JOB 1 - CI : BUILD + PUSH + SCAN
  # ===============================
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        # Note : Assure-toi d'avoir créé les secrets DOCKERHUB_TOKEN et DOCKERHUB_USERNAME sur GitHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master # Correction de la version
        with:
          # Correction : On scanne exactement l'image qu'on vient de builder
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          vuln-type: os,library
          ignore-unfixed: true

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  # ===============================
  # JOB 2 - CD : DEPLOY
  # ===============================
  deploy:
    needs: ci
    runs-on: ubuntu-latest # Changé de aws-runner à ubuntu-latest pour que ça marche
    steps:
      - name: Simulate Deploy
        run: |
          echo "Déploiement de l'image ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Le scan Trivy a réussi, le déploiement est sécurisé."